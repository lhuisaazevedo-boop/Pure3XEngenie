# ==========================================
# Pure3XEngenie v0.1.9 Alpha
# Global Configuration File
# ==========================================

[Engine]
Name=Pure3XEngenie
Version=0.1.9 Alpha
Profile=Auto
Language=pt_BR
Theme=Default
DebugMode=false
DeveloperMode=false

# ==========================================
# Localization
# ==========================================

[Localization]
CurrentLanguage=pt_BR
FallbackLanguage=en_US
AutoDetect=true

# Supported:
# pt_BR
# en_US
# es_ES
# fr_FR
# de_DE
# it_IT
# ja_JP
# ko_KR
# zh_CN

# ==========================================
# Graphics
# ==========================================

[Graphics]
Renderer=Vulkan
VSync=true
AsyncShader=true
ShaderCache=true
PipelineCache=true
RenderScale=1.0
Fullscreen=true

# ==========================================
# Driver Manager
# ==========================================

[Driver]
Mode=Auto
CustomDriver=
AutoDetectGPU=true
UseSystemDriver=true

# ==========================================
# Memory
# ==========================================

[Memory]
CacheSizeMB=512
TextureCache=true
MemoryCompression=false

# ==========================================
# CPU
# ==========================================

[CPU]
Threads=Auto
UseJIT=false
UseNCE=false
SPUThreads=1

# ==========================================
# Audio
# ==========================================

[Audio]
Enabled=true
Backend=Auto
MasterVolume=100
BufferSize=32

# ==========================================
# Input
# ==========================================

[Input]
EnableGamepad=true
EnableTouchControls=true
AutoDetectControllers=true
DeadZone=10

# ==========================================
# Network
# ==========================================

[Network]
Enabled=false
AllowBackgroundRequests=false

# ==========================================
# Logging
# ==========================================

[Logs]
Enabled=true
Level=Info
SaveToFile=true
ConsoleOutput=true

# Levels:
# Trace
# Debug
# Info
# Warning
# Error

# ==========================================
# Diagnostics
# ==========================================

[Diagnostics]
HardwareInfo=true
GPUInfo=true
MemoryInfo=true
DriverInfo=true

# ==========================================
# Experimental
# ==========================================

[Experimental]
EnableExperimentalFeatures=false
EnableFutureModules=false
